name: CI

on:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

env:
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/debox

jobs:
  test-backend:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - run: cd backend && go test ./... -count=1

  test-frontend:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm install --prefix frontend
      - run: npm test --prefix frontend

  build-push:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "sha_short=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/backend:${{ steps.vars.outputs.sha_short }}
            ${{ env.IMAGE_PREFIX }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/frontend:${{ steps.vars.outputs.sha_short }}
            ${{ env.IMAGE_PREFIX }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-manifests:
    needs: [build-push]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update backend image tag
        run: |
          cd k8s/backend
          kustomize edit set image \
            localhost:5443/debox/backend=${{ env.IMAGE_PREFIX }}/backend:${{ needs.build-push.outputs.sha_short }}

      - name: Update frontend image tag
        run: |
          cd k8s/frontend
          kustomize edit set image \
            localhost:5443/debox/frontend=${{ env.IMAGE_PREFIX }}/frontend:${{ needs.build-push.outputs.sha_short }}

      - name: Commit and push manifest changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/backend/kustomization.yaml k8s/frontend/kustomization.yaml
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update image tags to ${{ needs.build-push.outputs.sha_short }} [skip ci]"
          git push
