apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-backend
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  backend.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 }
            }
          },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace=\"debox\"}[5m])) by (route)",
              "legendFormat": "{{route}}"
            }
          ]
        },
        {
          "title": "Error Rate (5xx)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 },
              "color": { "mode": "fixed", "fixedColor": "red" }
            }
          },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace=\"debox\", status=~\"5..\"}[5m])) by (route)",
              "legendFormat": "{{route}}"
            }
          ]
        },
        {
          "title": "Request Duration p95 (seconds)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 }
            }
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{namespace=\"debox\"}[5m])) by (le, route))",
              "legendFormat": "p95 {{route}}"
            }
          ]
        },
        {
          "title": "Request Duration p50 (seconds)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 }
            }
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{namespace=\"debox\"}[5m])) by (le, route))",
              "legendFormat": "p50 {{route}}"
            }
          ]
        },
        {
          "title": "Requests by Status Code",
          "type": "piechart",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(increase(http_requests_total{namespace=\"debox\"}[1h])) by (status)",
              "legendFormat": "{{status}}"
            }
          ]
        },
        {
          "title": "Walrus Upload Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": { "drawStyle": "bars", "fillOpacity": 50, "lineWidth": 1 }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "failure" },
                "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }]
              },
              {
                "matcher": { "id": "byName", "options": "success" },
                "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "green" } }]
              }
            ]
          },
          "targets": [
            {
              "expr": "sum(rate(walrus_upload_total{namespace=\"debox\"}[5m])) by (outcome)",
              "legendFormat": "{{outcome}}"
            }
          ]
        },
        {
          "title": "Walrus Upload Duration p95",
          "type": "stat",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 2 },
                  { "color": "red", "value": 5 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(walrus_upload_duration_seconds_bucket{namespace=\"debox\"}[5m])) by (le))",
              "legendFormat": "p95"
            }
          ]
        },
        {
          "title": "Backend Pod CPU Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "drawStyle": "line", "fillOpacity": 20, "lineWidth": 2 }
            }
          },
          "targets": [
            {
              "expr": "rate(container_cpu_usage_seconds_total{namespace=\"debox\", pod=~\"backend.*\", container=\"backend\"}[5m])",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "title": "Backend Pod Memory Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": { "drawStyle": "line", "fillOpacity": 20, "lineWidth": 2 }
            }
          },
          "targets": [
            {
              "expr": "container_memory_working_set_bytes{namespace=\"debox\", pod=~\"backend.*\", container=\"backend\"}",
              "legendFormat": "{{pod}}"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["debox", "backend"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "DeBOX Backend",
      "uid": "debox-backend"
    }
