apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-frontend
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  frontend.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "Frontend Pod CPU Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "drawStyle": "line", "fillOpacity": 20, "lineWidth": 2 }
            }
          },
          "targets": [
            {
              "expr": "rate(container_cpu_usage_seconds_total{namespace=\"debox\", pod=~\"frontend.*\", container=\"frontend\"}[5m])",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "title": "Frontend Pod Memory Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": { "drawStyle": "line", "fillOpacity": 20, "lineWidth": 2 }
            }
          },
          "targets": [
            {
              "expr": "container_memory_working_set_bytes{namespace=\"debox\", pod=~\"frontend.*\", container=\"frontend\"}",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "title": "Frontend Pod Restarts",
          "type": "stat",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "sum(kube_pod_container_status_restarts_total{namespace=\"debox\", container=\"frontend\"})",
              "legendFormat": "restarts"
            }
          ]
        },
        {
          "title": "Frontend Pod Status",
          "type": "stat",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "1": { "text": "Ready", "color": "green" }, "0": { "text": "Not Ready", "color": "red" } } }
              ]
            }
          },
          "targets": [
            {
              "expr": "kube_pod_status_ready{namespace=\"debox\", pod=~\"frontend.*\", condition=\"true\"}",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "title": "Frontend Network Receive (bytes/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 }
            }
          },
          "targets": [
            {
              "expr": "rate(container_network_receive_bytes_total{namespace=\"debox\", pod=~\"frontend.*\"}[5m])",
              "legendFormat": "rx {{pod}}"
            }
          ]
        },
        {
          "title": "Frontend Network Transmit (bytes/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 }
            }
          },
          "targets": [
            {
              "expr": "rate(container_network_transmit_bytes_total{namespace=\"debox\", pod=~\"frontend.*\"}[5m])",
              "legendFormat": "tx {{pod}}"
            }
          ]
        },
        {
          "title": "Frontend CPU vs Limit",
          "type": "gauge",
          "gridPos": { "h": 8, "w": 6, "x": 12, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.7 },
                  { "color": "red", "value": 0.9 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "rate(container_cpu_usage_seconds_total{namespace=\"debox\", pod=~\"frontend.*\", container=\"frontend\"}[5m]) / on(pod) kube_pod_container_resource_limits{namespace=\"debox\", container=\"frontend\", resource=\"cpu\"}",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "title": "Frontend Memory vs Limit",
          "type": "gauge",
          "gridPos": { "h": 8, "w": 6, "x": 18, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.7 },
                  { "color": "red", "value": 0.9 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "container_memory_working_set_bytes{namespace=\"debox\", pod=~\"frontend.*\", container=\"frontend\"} / on(pod) kube_pod_container_resource_limits{namespace=\"debox\", container=\"frontend\", resource=\"memory\"}",
              "legendFormat": "{{pod}}"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["debox", "frontend"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "DeBOX Frontend",
      "uid": "debox-frontend"
    }
