# ArgoCD Helm values for local kind cluster
# Chart: argo/argo-cd
# Kustomize is natively supported — no CMP plugin required.

global:
  domain: localhost

configs:
  params:
    server.insecure: true

server:
  service:
    type: NodePort
    nodePortHttp: 30800
  extraArgs:
    - --disable-auth

controller:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

repoServer:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

redis:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

applicationSet:
  enabled: false

notifications:
  enabled: false

dex:
  enabled: false
